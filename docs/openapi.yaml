                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                password:
                  type: string
                  example: "jane.doe@acme.gov"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "Str0ng!Pass"
                name:
                  type: string
                  example: "Jane Smith"
                company:
                  type: string
                  example: "Acme Federal LLC"
                  example: "Jane Doe"
                company:
                  type: string
                  example: "Acme Defense Solutions"
                naicsCodes:
                  type: array
                  items:
                    type: string
                  example: ["541511"]
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
