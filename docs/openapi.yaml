openapi: "3.0.3"
info:
  title: GovCon AI Scanner API
  description: |
    Professional REST API for the **GovCon AI Scanner** platform — an enterprise-grade tool
    for searching SAM.gov opportunities, analyzing solicitation documents for bid/no-bid
    decisions, and managing government contracting pipelines.

    ## Authentication

    All protected endpoints require a JWT `Bearer` token in the `Authorization` header:

    ```
    Authorization: Bearer <access_token>
    ```

    Tokens are obtained via `/api/auth/login` or `/api/auth/register` and expire after **15 minutes**.
    Use `/api/auth/refresh` with your `refreshToken` (valid for 7 days) to get a new access token
    without requiring the user to log in again.

    ## Rate Limits

    | Endpoint Group | Limit |
    |----------------|-------|
    | Auth endpoints | 30 req / 15 min per IP |
    | API endpoints  | 200 req / 15 min per IP |
    | Admin endpoints| 200 req / 15 min per IP |

    When a rate limit is exceeded, the API returns **HTTP 429** with a `Retry-After` header.

    ## Error Format

    All errors follow a consistent JSON structure:

    ```json
    {
      "success": false,
      "error": "Human-readable error message",
      "errorCode": "OPTIONAL_MACHINE_CODE"
    }
    ```

    ## Pagination

    List endpoints accept `page` (1-based) and `limit` query parameters and return:

    ```json
    {
      "pagination": {
        "page": 1,
        "limit": 20,
        "total": 150,
        "pages": 8
      }
    }
    ```
  version: "2.0.0"
  contact:
    name: GovCon AI Scanner Support
    url: https://govcon-ai-scanner.onrender.com

servers:
  - url: https://govcon-ai-scanner.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: User registration, login, token refresh, and profile management
  - name: Opportunities
    description: Search SAM.gov, save opportunities, and analyze documents
  - name: Email
    description: Email digest preferences and notification management
  - name: Admin – Users
    description: "Admin: user management (requires admin role)"
  - name: Admin – Analytics
    description: "Admin: platform analytics and usage reporting"
  - name: Admin – Subscriptions
    description: "Admin: subscription and trial management"
  - name: Admin – Health
    description: "Admin: system health and integration status"
  - name: System
    description: Public health check

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Invalid credentials."
        errorCode:
          type: string
          nullable: true
          example: "MISSING_API_KEY"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        pages:
          type: integer
          example: 8

    User:
      type: object
      properties:
        id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        email:
          type: string
          format: email
          example: "jane.doe@acme.gov"
        name:
          type: string
          example: "Jane Doe"
        company:
          type: string
          example: "Acme Defense Solutions"
        naicsCodes:
          type: array
          items:
            type: string
          example: ["541330", "541512", "336411"]
        role:
          type: string
          enum: [user, admin]
          example: "user"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T09:30:00.000Z"

    Opportunity:
      type: object
      properties:
        noticeId:
          type: string
          example: "fa7bc123456789"
        title:
          type: string
          example: "IT Support Services IDIQ"
        solicitationNumber:
          type: string
          example: "W900KK-24-R-0001"
        agency:
          type: string
          example: "DEPT OF DEFENSE"
        naicsCode:
          type: string
          example: "541512"
        pscCode:
          type: string
          example: "D302"
        postedDate:
          type: string
          example: "2024-01-10"
        responseDeadLine:
          type: string
          example: "2024-02-10"
        setAside:
          type: string
          example: "Small Business"
        uiLink:
          type: string
          format: uri
          example: "https://sam.gov/opp/fa7bc123456789/view"

    AnalysisResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        fileName:
          type: string
          example: "RFP_W900KK-24-R-0001.pdf"
        bidScore:
          type: integer
          minimum: 0
          maximum: 100
          example: 72
        recommendation:
          type: string
          enum: [BID, NO-BID, REVIEW]
          example: "BID"
        clausesDetected:
          type: array
          items:
            type: string
          example: ["FAR 52.204-7", "DFARS 252.204-7012", "FAR 52.222-26"]
        extractedTextPreview:
          type: string
          example: "SECTION B – SUPPLIES OR SERVICES..."
        disclaimer:
          type: string
          example: "Designed for Non-Classified Use Only"

paths:
  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns the application health status. No authentication required.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  app:
                    type: string
                    example: "GovCon AI Scanner"
                  env:
                    type: string
                    example: "production"
                  samConfigured:
                    type: boolean
                    example: true
                  mongoConfigured:
                    type: boolean
                    example: true

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane.doe@acme.gov"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "Str0ng!Pass"
                name:
                  type: string
                  example: "Jane Doe"
                company:
                  type: string
                  example: "Acme Defense Solutions"
                naicsCodes:
                  type: array
                  items:
                    type: string
                  example: ["541330", "541512"]
            examples:
              basic:
                summary: Minimal registration
                value:
                  email: "jane@example.com"
                  password: "MySecret123"
              full:
                summary: Full registration
                value:
                  email: "jane@example.com"
                  password: "MySecret123"
                  name: "Jane Doe"
                  company: "Acme Defense"
                  naicsCodes: ["541330", "541512"]
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive JWT tokens
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "jane.doe@acme.gov"
                password:
                  type: string
                  format: password
                  example: "Str0ng!Pass"
      responses:
        "200":
          description: Authenticated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                    description: Short-lived JWT (15 minutes)
                  refreshToken:
                    type: string
                    description: Long-lived refresh token (7 days)
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        "403":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out (invalidate refresh token)
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logged out successfully."

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: "#/components/schemas/User"
    patch:
      tags: [Auth]
      summary: Update current user profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Jane Smith"
                company:
                  type: string
                  example: "Smith Defense LLC"
                naicsCodes:
                  type: array
                  items:
                    type: string
                  example: ["541330"]
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: "#/components/schemas/User"

  # ---------------------------------------------------------------------------
  # Opportunities
  # ---------------------------------------------------------------------------
  /api/opportunities/search:
    post:
      tags: [Opportunities]
      summary: Search SAM.gov opportunities
      operationId: searchOpportunities
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postedFrom, postedTo]
              properties:
                postedFrom:
                  type: string
                  description: "Date in MM/DD/YYYY format"
                  example: "01/01/2024"
                postedTo:
                  type: string
                  description: "Date in MM/DD/YYYY format"
                  example: "01/31/2024"
                keyword:
                  type: string
                  example: "cybersecurity"
                naics:
                  type: string
                  example: "541512"
                psc:
                  type: string
                  example: "D302"
                setAside:
                  type: string
                  example: "SBA"
                noticeType:
                  type: string
                  example: "o"
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 100
                  maximum: 1000
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  totalRecords:
                    type: integer
                    example: 1247
                  page:
                    type: integer
                    example: 1
                  opportunities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"

  /api/opportunities:
    get:
      tags: [Opportunities]
      summary: Get user's saved opportunities
      operationId: getSavedOpportunities
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved opportunities
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  opportunities:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"

  /api/opportunities/save:
    post:
      tags: [Opportunities]
      summary: Save an opportunity to the user's list
      operationId: saveOpportunity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opportunity]
              properties:
                opportunity:
                  $ref: "#/components/schemas/Opportunity"
      responses:
        "200":
          description: Opportunity saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  opportunity:
                    $ref: "#/components/schemas/Opportunity"

  /api/opportunities/analyze:
    post:
      tags: [Opportunities]
      summary: Analyze a solicitation document (bid/no-bid scoring)
      operationId: analyzeDocument
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, DOCX, or TXT solicitation document (max 10 MB)
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: Raw solicitation text to analyze
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /api/opportunities/debug:
    get:
      tags: [Opportunities]
      summary: Test SAM.gov API connectivity
      operationId: debugSamApi
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SAM API reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "SAM API connectivity confirmed."
                  totalRecords:
                    type: integer
                    nullable: true

  # ---------------------------------------------------------------------------
  # Email Preferences
  # ---------------------------------------------------------------------------
  /api/email-preferences/preferences:
    get:
      tags: [Email]
      summary: Get email notification preferences
      operationId: getEmailPreferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Email preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  preferences:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      frequency:
                        type: string
                        enum: [daily, weekly, never]
                      deliveryTime:
                        type: integer
                        minimum: 0
                        maximum: 23
                      naicsFilter:
                        type: array
                        items:
                          type: string
                      minBidScore:
                        type: integer

  /api/email-preferences/preferences/update:
    post:
      tags: [Email]
      summary: Update email notification preferences
      operationId: updateEmailPreferences
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                frequency:
                  type: string
                  enum: [daily, weekly, never]
                deliveryTime:
                  type: integer
                  minimum: 0
                  maximum: 23
                naicsFilter:
                  type: array
                  items:
                    type: string
                minBidScore:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        "200":
          description: Preferences updated

  # ---------------------------------------------------------------------------
  # Admin – Dashboard
  # ---------------------------------------------------------------------------
  /api/admin/dashboard:
    get:
      tags: [Admin – Analytics]
      summary: Platform KPI dashboard
      description: Returns key metrics — total users, active users, saved opportunities, email subscribers, and more. **Requires admin role.**
      operationId: adminDashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  metrics:
                    type: object
                    properties:
                      users:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 342
                          active:
                            type: integer
                            example: 318
                          newThisMonth:
                            type: integer
                            example: 47
                          admins:
                            type: integer
                            example: 2
                      opportunities:
                        type: object
                        properties:
                          cached:
                            type: integer
                            example: 15420
                          saved:
                            type: integer
                            example: 891
                      email:
                        type: object
                        properties:
                          subscribed:
                            type: integer
                            example: 287
                      generatedAt:
                        type: string
                        format: date-time
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Admin – Users
  # ---------------------------------------------------------------------------
  /api/admin/users:
    get:
      tags: [Admin – Users]
      summary: List all users (paginated)
      operationId: adminListUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: search
          schema:
            type: string
          description: Search by email, name, or company
        - in: query
          name: role
          schema:
            type: string
            enum: [user, admin]
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/users/{id}:
    get:
      tags: [Admin – Users]
      summary: Get user details and usage stats
      operationId: adminGetUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: "#/components/schemas/User"
                  emailPreferences:
                    type: object
                  stats:
                    type: object
                    properties:
                      savedOpportunities:
                        type: integer
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Admin – Users]
      summary: Update user (admin override)
      operationId: adminUpdateUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                company:
                  type: string
                naicsCodes:
                  type: array
                  items:
                    type: string
                role:
                  type: string
                  enum: [user, admin]
                isActive:
                  type: boolean
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: "#/components/schemas/User"
    delete:
      tags: [Admin – Users]
      summary: Deactivate a user account
      operationId: adminDeactivateUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "User deactivated."

  /api/admin/users/{id}/activity:
    get:
      tags: [Admin – Users]
      summary: Get user activity log (saved opportunities)
      operationId: adminGetUserActivity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  activity:
                    type: array
                    items:
                      $ref: "#/components/schemas/Opportunity"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ---------------------------------------------------------------------------
  # Admin – Analytics
  # ---------------------------------------------------------------------------
  /api/admin/analytics/usage:
    get:
      tags: [Admin – Analytics]
      summary: Daily user registration trends
      operationId: adminAnalyticsUsage
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        "200":
          description: Daily registration counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  period:
                    type: string
                    example: "30d"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          example: "2024-01-15"
                        registrations:
                          type: integer
                          example: 12

  /api/admin/analytics/features:
    get:
      tags: [Admin – Analytics]
      summary: Feature adoption statistics
      operationId: adminAnalyticsFeatures
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feature usage counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  featureUsage:
                    type: object
                    properties:
                      naicsCodeConfiguration:
                        type: integer
                        example: 245
                      emailAlertsEnabled:
                        type: integer
                        example: 189
                      opportunitiesSaved:
                        type: integer
                        example: 891

  /api/admin/analytics/search-trends:
    get:
      tags: [Admin – Analytics]
      summary: Popular NAICS codes and search trends
      operationId: adminSearchTrends
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search trend data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  naicsCodesByUsers:
                    type: array
                    items:
                      type: object
                      properties:
                        naicsCode:
                          type: string
                          example: "541512"
                        userCount:
                          type: integer
                          example: 87
                  savedOpportunityTrends:
                    type: array
                    items:
                      type: object
                      properties:
                        naicsCode:
                          type: string
                        totalSaves:
                          type: integer
                        uniqueOpportunities:
                          type: integer

  /api/admin/analytics/export:
    get:
      tags: [Admin – Analytics]
      summary: Export user data as CSV or JSON
      operationId: adminExport
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Exported data file
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string

  # ---------------------------------------------------------------------------
  # Admin – Subscriptions
  # ---------------------------------------------------------------------------
  /api/admin/subscriptions:
    get:
      tags: [Admin – Subscriptions]
      summary: List all subscriptions
      operationId: adminListSubscriptions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Subscription list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  subscriptions:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/subscriptions/{userId}:
    get:
      tags: [Admin – Subscriptions]
      summary: Get subscription details for a user
      operationId: adminGetSubscription
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription details

  /api/admin/subscriptions/{userId}/extend-trial:
    post:
      tags: [Admin – Subscriptions]
      summary: Extend trial period for a user
      operationId: adminExtendTrial
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                days:
                  type: integer
                  default: 30
                  example: 15
                  description: Number of additional trial days to grant
                note:
                  type: string
                  example: "Extended for sales demo call on 2024-02-01"
      responses:
        "200":
          description: Trial extended
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Trial extended by 15 days for jane@example.com."

  /api/admin/subscriptions/{userId}/issue-refund:
    post:
      tags: [Admin – Subscriptions]
      summary: Record a refund (process in Stripe dashboard)
      operationId: adminIssueRefund
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  example: 79.00
                reason:
                  type: string
                  example: "Customer dissatisfied with trial experience"
      responses:
        "200":
          description: Refund recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string

  # ---------------------------------------------------------------------------
  # Admin – Health
  # ---------------------------------------------------------------------------
  /api/admin/health/system:
    get:
      tags: [Admin – Health]
      summary: Server system metrics
      operationId: adminSystemHealth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  system:
                    type: object
                    properties:
                      uptime:
                        type: integer
                        description: Seconds since server start
                        example: 86400
                      nodeVersion:
                        type: string
                        example: "v20.11.0"
                      memory:
                        type: object
                      loadAverage:
                        type: array
                        items:
                          type: number

  /api/admin/health/integrations:
    get:
      tags: [Admin – Health]
      summary: Integration connectivity status
      operationId: adminIntegrationHealth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Integration statuses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  integrations:
                    type: object
                    properties:
                      mongodb:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [connected, connecting, disconnected, unconfigured, error]
                          message:
                            type: string
                      samApi:
                        type: object
                      stripe:
                        type: object
                      email:
                        type: object

  /api/admin/logs:
    get:
      tags: [Admin – Health]
      summary: System logs (stub — use Datadog for production logs)
      operationId: adminLogs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: level
          schema:
            type: string
            enum: [error, warn, info, debug]
      responses:
        "200":
          description: Log entries (see Datadog for full logs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                  logs:
                    type: array
                    items:
                      type: object
