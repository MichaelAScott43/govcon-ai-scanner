services:
  - type: web
    name: govcon-ai-scanner
    runtime: node
    buildCommand: npm install && npm run build:frontend
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SAM_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: STRIPE_PAYMENT_LINK
        sync: false
      - key: DD_ENABLED
        value: "false"
      - key: DD_SERVICE
        value: govcon-ai-scanner
      - key: DD_ENV
        value: production

  - type: web
    name: govcon-opportunity-intelligence
    runtime: python
    rootDir: intelligence
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAM_API_KEY
        sync: false
      - key: SQLITE_DB_PATH
        value: "intelligence.db"
      - key: INTELLIGENCE_DAYS_BACK
        value: "30"
      - key: INTELLIGENCE_MAX_RECORDS
        value: "500"

  - type: web
    name: govcon-intelligence
    runtime: python
    buildCommand: pip install -r intelligence/requirements.txt
    startCommand: uvicorn intelligence.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAM_API_KEY
        sync: false
      - key: PORT
        value: "10001"
      - key: INTEL_PORT
        value: "10001"
      - key: INTELLIGENCE_DB_PATH
        value: "/tmp/intelligence.db"
