<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GovCon Compliance Co-Pilot</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 28px; max-width: 980px; }
    textarea { width: 100%; padding: 12px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .muted { color: #555; font-size: 13px; }
    pre { white-space: pre-wrap; background: #f6f6f6; padding: 14px; border-radius: 8px; }
    select, input { padding: 8px; }
  </style>
</head>
<body>
  <h1>AI Procurement Compliance Co-Pilot (GovCon)</h1>
  <p class="muted">
    Paste purchasing file notes, subcontract language, supplier quote, PO text, or T&Cs.
    You’ll get CPSR/DCMA-focused risk flags and next actions.
  </p>

  <div class="row">
    <label>
      Review Type:
      <select id="reviewType">
        <option value="general">General CPSR Risk Scan</option>
        <option value="flowdown">Flowdown / Clause Focus</option>
        <option value="price">Competition / Price Analysis Focus</option>
        <option value="export">ITAR/EAR Indicators Focus</option>
      </select>
    </label>

    <label>
      Contract Type (optional):
      <input id="contractType" placeholder="e.g., FFP, T&M, CPFF" />
    </label>

    <button id="btn" onclick="analyze()">Run Scan</button>
  </div>

  <br/>

  <textarea id="inputText" rows="16" placeholder="Paste the procurement/subcontract text here..."></textarea>

  <p class="muted" id="status"></p>
  <pre id="output"></pre>

<script>
async function analyze() {
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  const text = document.getElementById("inputText").value.trim();
  const reviewType = document.getElementById("reviewType").value;
  const contractType = document.getElementById("contractType").value.trim();

  output.textContent = "";
  if (!text) {
    output.textContent = "Please paste some text to analyze.";
    return;
  }

  btn.disabled = true;
  status.textContent = "Running scan...";

  try {
    const resp = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text, reviewType, contractType })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error || `Request failed (${resp.status})`);
    }

    const data = await resp.json();
    output.textContent = data.result || "No result returned.";
    status.textContent = "Done.";
  } catch (e) {
    status.textContent = "Error.";
    output.textContent = String(e.message || e);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
